name: Build Flutter Desktop

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows-linux:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: windows-latest
            target: windows
            config: --enable-windows-desktop
            artifact: build/windows/x64/runner/Release
          - os: ubuntu-latest
            target: linux
            config: --enable-linux-desktop
            artifact: build/linux/x64/release/bundle
    runs-on: ${{ matrix.platform.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable desktop support
        run: flutter config ${{ matrix.platform.config }}

      - name: Install Linux dependencies
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libx11-dev libxrandr-dev \
            libayatana-appindicator3-dev || sudo apt-get install -y libappindicator3-dev

      - name: Get dependencies
        run: flutter pub get

      - name: Build
        run: flutter build ${{ matrix.platform.target }} --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: my_app_${{ matrix.platform.target }}
          path: ${{ matrix.platform.artifact }}
          retention-days: 7

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Accept Xcode license
        run: |
          sudo xcodebuild -license accept || true
          sudo xcodebuild -runFirstLaunch

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Clean previous build
        run: flutter clean

      - name: Build macOS release with diagnostics
        run: |
          # Сначала пробуем обычную сборку
          flutter build macos --release || {
            echo "===== BUILD FAILED, TRYING TO FIX ====="
            
            # Отключаем code signing
            cd macos
            sed -i '' 's/CODE_SIGN_IDENTITY = ".*"/CODE_SIGN_IDENTITY = "-"/' Runner.xcodeproj/project.pbxproj
            sed -i '' 's/CODE_SIGNING_REQUIRED = YES/CODE_SIGNING_REQUIRED = NO/' Runner.xcodeproj/project.pbxproj
            sed -i '' 's/CODE_SIGNING_ALLOWED = NO/CODE_SIGNING_ALLOWED = YES/' Runner.xcodeproj/project.pbxproj
            cd ..
            
            # Пробуем снова
            flutter build macos --release
          }
          
          # Проверяем результат
          if [ -d "build/macos/Build/Products/Release/Runner.app" ]; then
            echo "✅ macOS build successful!"
            ls -la build/macos/Build/Products/Release/
          else
            echo "❌ macOS build failed - Runner.app not found"
            echo "Looking for any .app files..."
            find build -name "*.app" -type d
            exit 1
          fi

      - name: Package macOS app
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../../my_app_macos.zip Runner.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: my_app_macos
          path: my_app_macos.zip
          retention-days: 7