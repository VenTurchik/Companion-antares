  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Accept Xcode license
        run: |
          sudo xcodebuild -license accept || true
          sudo xcodebuild -runFirstLaunch

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Clean previous build
        run: flutter clean

      - name: Build macOS release
        run: |
          # Отключаем code signing
          cd macos
          sed -i '' 's/CODE_SIGN_IDENTITY = ".*"/CODE_SIGN_IDENTITY = "-"/' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGNING_REQUIRED = YES/CODE_SIGNING_REQUIRED = NO/' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGNING_ALLOWED = NO/CODE_SIGNING_ALLOWED = YES/' Runner.xcodeproj/project.pbxproj
          cd ..
          
          # Собираем
          flutter build macos --release
          
          # Проверяем результат
          if [ -d "build/macos/Build/Products/Release/companion.app" ]; then
            echo "✅ macOS build successful!"
          else
            echo "❌ macOS build failed - companion.app not found"
            exit 1
          fi

      - name: Package macOS app
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../../my_app_macos.zip companion.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: my_app_macos
          path: my_app_macos.zip
          retention-days: 7